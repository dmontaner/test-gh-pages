<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: Arial, sans-serif; background: #f0f4f8; }
        h1 { font-size: 2.5rem; color: #333; margin-bottom: 40px; }
        .nav { display: flex; gap: 30px; }
        .nav button { width: 60px; height: 60px; border-radius: 50%; border: none; background: #4a90d9; color: #fff; font-size: 1.5rem; cursor: pointer; transition: background 0.2s; }
        .nav button:hover { background: #357ab8; }
    </style>
</head>
<body>
    <h1>Welcome to Page 1</h1>
    <div class="nav">
        <button onclick="showPage('prev')">&larr;</button>
        <button onclick="showPage('next')">&rarr;</button>
    </div>
    <script>
        const pages = ['page1.html','page2.html','page3.html','page4.html','page5.html'];
        const current = 0;
        function showPage(dir) {
            const next = dir === 'next'
                ? (current + 1) % pages.length
                : (current - 1 + pages.length) % pages.length;
            window.location.href = pages[next];
        }
    </script>
</body>
</html>
